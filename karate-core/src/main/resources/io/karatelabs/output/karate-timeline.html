<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="res/karate-report.css"/>
    <link rel="icon" href="res/favicon.ico"/>
    <link rel="stylesheet" href="https://unpkg.com/vis-timeline@7/styles/vis-timeline-graph2d.min.css"/>
    <script src="https://unpkg.com/vis-timeline@7/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <script src="res/alpine.min.js" defer></script>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('karate-theme') || 'light');</script>
    <!-- KARATE_EXTS -->
    <title>Karate Timeline</title>
    <style>
        #timeline {
            width: 100%;
            /* Cap so the Slowest scenarios panel below stays visible without
               scrolling past a full-viewport gantt. vis-timeline auto-scrolls
               internally when content exceeds the height. */
            max-height: 60vh;
            min-height: 320px;
        }
        .vis-item.failed { background-color: #dc2626 !important; border-color: #b91c1c !important; color: white !important; }
        .vis-item.passed { background-color: #16a34a !important; border-color: #15803d !important; color: white !important; }
        .vis-label { font-size: 0.9rem; }
        .vis-item-content { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* Light mode — soften vis-timeline's default greys to match the D20 surface palette. */
        .vis-timeline { border-color: #e2e8f0; }
        .vis-labelset .vis-label { background-color: #f8fafc; color: #0f172a; border-color: #e2e8f0; }
        .vis-time-axis .vis-text { color: #475569; }
        .vis-time-axis .vis-grid.vis-minor { border-color: #e2e8f0; }
        .vis-time-axis .vis-grid.vis-major { border-color: #cbd5e1; }
        /* Dark mode for vis-timeline (we set data-theme on <html>) */
        [data-theme="dark"] .vis-timeline { border-color: #475569; }
        [data-theme="dark"] .vis-panel.vis-background,
        [data-theme="dark"] .vis-panel.vis-center { background-color: #1e293b; }
        [data-theme="dark"] .vis-labelset .vis-label {
            background-color: #334155; color: #f1f5f9; border-color: #475569;
        }
        [data-theme="dark"] .vis-time-axis .vis-text { color: #cbd5e1; }
        [data-theme="dark"] .vis-time-axis .vis-grid.vis-minor { border-color: #475569; }
        [data-theme="dark"] .vis-time-axis .vis-grid.vis-major { border-color: #64748b; }
    </style>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans antialiased" x-data="KarateReport.timelineData()">
    <!-- KARATE_ICONS -->
    <nav class="flex items-center justify-between px-4 py-2 bg-slate-100 dark:bg-brand-navbar text-slate-900 dark:text-white border-b border-slate-200 dark:border-transparent">
        <a class="flex items-center gap-2 font-medium" href="karate-summary.html">
            <img src="res/karate-logo.svg" alt="Karate" height="32" class="h-8"/>
            <span>Timeline</span>
        </a>
        <div class="flex items-center gap-4">
            <a class="text-sm text-slate-600 hover:text-slate-900 dark:text-white/80 dark:hover:text-white" href="karate-summary.html">Summary</a>
            <button class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-white/10" @click="toggleTheme()" title="Toggle theme">
                <svg x-show="theme === 'light'" class="w-4 h-4"><use href="#icon-moon"/></svg>
                <svg x-show="theme === 'dark'" class="w-4 h-4"><use href="#icon-sun"/></svg>
            </button>
            <span class="hidden sm:inline-block w-px h-5 bg-slate-300 dark:bg-white/20"></span>
            <a href="https://karatelabs.io/karate-enterprise?utm_source=karate-os&utm_medium=report&utm_campaign=enterprise-cta&utm_content=timeline"
               target="_blank" rel="noopener"
               class="group inline-flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-medium bg-accent text-white hover:bg-accent-dark transition-colors"
               title="Karate Open Source vs Karate Enterprise — see what's included">
                <svg class="w-3.5 h-3.5"><use href="#icon-sparkle"/></svg>
                <span><span class="hidden md:inline">Try </span>Karate Enterprise</span>
                <svg class="w-3 h-3 transition-transform group-hover:translate-x-0.5"><use href="#icon-arrow-right"/></svg>
            </a>
        </div>
    </nav>

    <div class="px-6 py-5">
        <!-- Hero -->
        <section class="mb-5">
            <div class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full border text-xs font-medium" :class="heroStatus.pillCls">
                <span class="w-1.5 h-1.5 rounded-full" :class="heroStatus.dotCls"></span>
                <span x-text="heroStatus.label"></span>
            </div>
            <h1 class="mt-3 text-2xl md:text-3xl font-semibold tracking-tight">Execution Timeline</h1>
            <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-sm text-slate-500 dark:text-slate-400">
                <span class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-clock"/></svg> <span x-text="data.reportDate">Date</span></span>
                <span x-show="data.env" class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-server"/></svg> env <span class="font-mono" x-text="data.env"></span></span>
                <span x-show="data.threads" class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-cpu"/></svg> <span x-text="data.threads"></span> threads</span>
            </div>
        </section>
        <!-- KPI cards: Speedup + Wall clock. Skipped when suite duration is too
             noisy (<100ms) — see speedup getter in karate-report.js. -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5" x-show="speedup || data.summary?.duration_millis">
            <div class="rounded-lg p-4 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50" x-show="speedup">
                <div class="text-sm text-slate-500 dark:text-slate-400">Speedup</div>
                <div class="text-3xl font-bold mt-1 tabular-nums" x-text="speedup">1.0x</div>
                <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">vs. serial execution</div>
            </div>
            <div class="rounded-lg p-4 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
                <div class="text-sm text-slate-500 dark:text-slate-400">Wall clock</div>
                <div class="text-3xl font-bold mt-1 tabular-nums" x-text="wallClock">0 ms</div>
                <div class="text-xs text-slate-500 dark:text-slate-400 mt-1">total suite duration</div>
            </div>
        </div>

        <div class="flex gap-4 text-sm mb-3 text-slate-600 dark:text-slate-400">
            <span class="inline-flex items-center gap-1.5">
                <span class="inline-block w-3 h-3 rounded-sm bg-green-600"></span> Passed
            </span>
            <span class="inline-flex items-center gap-1.5">
                <span class="inline-block w-3 h-3 rounded-sm bg-red-600"></span> Failed
            </span>
        </div>
        <div id="timeline"></div>

        <!-- Top-5 slowest scenarios. Links jump into the feature page anchor. -->
        <section class="mt-6" x-show="slowestScenarios.length > 0">
            <h2 class="text-lg font-semibold mb-3">Slowest scenarios</h2>
            <div class="rounded-lg border border-slate-200 dark:border-slate-700 overflow-hidden">
                <template x-for="(s, i) in slowestScenarios" :key="i">
                    <a :href="scenarioHref(s)"
                       class="flex items-center justify-between gap-3 px-3 py-2 text-sm border-b border-slate-100 dark:border-slate-800 last:border-b-0 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                        <span class="flex items-center gap-2 min-w-0">
                            <span class="inline-block w-2 h-2 rounded-full shrink-0"
                                  :class="s.passed ? 'bg-green-500' : 'bg-red-500'"></span>
                            <span class="font-mono text-xs text-slate-500 dark:text-slate-400 shrink-0" x-text="s.featureFileName + s.refId"></span>
                            <span class="truncate text-slate-700 dark:text-slate-300" x-text="s.name || ''"></span>
                        </span>
                        <span class="font-mono tabular-nums text-slate-700 dark:text-slate-300 shrink-0" x-text="s.durationMillis + ' ms'"></span>
                    </a>
                </template>
            </div>
        </section>
    </div>

    <footer class="border-t border-slate-200 dark:border-slate-700 text-center text-xs text-slate-500 dark:text-slate-400 py-4 mt-6">
        Generated by <a href="https://karatelabs.io" target="_blank" rel="noopener" class="hover:text-accent">Karate <span x-text="data.karateVersion">2.0</span></a>
        <span class="mx-1.5">·</span>
        <span x-text="data.reportDate"></span>
        <span class="mx-1.5">·</span>
        <a href="https://docs.karatelabs.io/" target="_blank" rel="noopener" class="hover:text-accent">Documentation</a>
    </footer>

    <script src="res/karate-report.js"></script>
    <script id="karate-data" type="application/json">/* KARATE_DATA */</script>
</body>
</html>
