<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="res/karate-report.css"/>
    <link rel="icon" href="res/favicon.ico"/>
    <script src="res/alpine.min.js" defer></script>
    <!-- FOUC fix: set theme before paint, ahead of Alpine + karate-report.js. -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('karate-theme') || 'light');</script>
    <!-- KARATE_EXTS -->
    <title>Karate Summary</title>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans antialiased" x-data="KarateReport.summaryData()">
    <!-- KARATE_ICONS -->
    <nav class="flex items-center justify-between px-4 py-2 bg-slate-100 dark:bg-brand-navbar text-slate-900 dark:text-white border-b border-slate-200 dark:border-transparent">
        <a class="flex items-center gap-2 font-medium" href="karate-summary.html">
            <img src="res/karate-logo.svg" alt="Karate" height="32" class="h-8"/>
            <span>Summary</span>
        </a>
        <div class="flex items-center gap-4">
            <a class="text-sm text-slate-600 hover:text-slate-900 dark:text-white/80 dark:hover:text-white" href="karate-timeline.html">Timeline</a>
            <!-- KARATE_NAV -->
            <button class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-white/10" @click="toggleTheme()" title="Toggle theme">
                <svg x-show="theme === 'light'" class="w-4 h-4"><use href="#icon-moon"/></svg>
                <svg x-show="theme === 'dark'" class="w-4 h-4"><use href="#icon-sun"/></svg>
            </button>
            <span class="hidden sm:inline-block w-px h-5 bg-slate-300 dark:bg-white/20"></span>
            <!-- KARATE_CTA -->
        </div>
    </nav>

    <div class="px-6 py-5">
        <!-- Hero -->
        <section class="mb-6 flex items-start justify-between gap-6">
            <div class="min-w-0 flex-1">
                <div class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full border text-xs font-medium" :class="heroStatus.pillCls">
                    <span class="w-1.5 h-1.5 rounded-full" :class="heroStatus.dotCls"></span>
                    <span x-text="heroStatus.label"></span>
                </div>
                <h1 class="mt-3 text-2xl md:text-3xl font-semibold tracking-tight">Karate Test Report</h1>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-sm text-slate-500 dark:text-slate-400">
                    <span class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-clock"/></svg> <span x-text="data.reportDate">Date</span></span>
                    <span x-show="data.env" class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-server"/></svg> env <span class="font-mono" x-text="data.env"></span></span>
                    <span x-show="data.threads" class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-cpu"/></svg> <span x-text="data.threads"></span> threads</span>
                </div>
            </div>
            <!-- Pass-rate donut. Three <circle> segments (pass / skip / fail) are unrolled (no
                 x-for in SVG, see karate-report.js#donutPass). The green pass arc shows only real
                 passes and the amber arc shows skipped, so the arcs don't overlap; the center %
                 still counts skipped as passed (see karate-report.js#donutPct). -->
            <div class="relative shrink-0" x-show="donutTotal > 0">
                <svg class="w-32 h-32 -rotate-90" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="50" fill="none" stroke="currentColor" stroke-width="14" class="text-slate-200 dark:text-slate-700"/>
                    <circle x-show="donutPass" cx="60" cy="60" r="50" fill="none" stroke="currentColor" stroke-width="14"
                            pathLength="100" stroke-linecap="butt" class="text-green-600"
                            :stroke-dasharray="donutPass?.dash" :stroke-dashoffset="donutPass?.offset"/>
                    <circle x-show="donutSkip" cx="60" cy="60" r="50" fill="none" stroke="currentColor" stroke-width="14"
                            pathLength="100" stroke-linecap="butt" class="text-amber-500"
                            :stroke-dasharray="donutSkip?.dash" :stroke-dashoffset="donutSkip?.offset"/>
                    <circle x-show="donutFail" cx="60" cy="60" r="50" fill="none" stroke="currentColor" stroke-width="14"
                            pathLength="100" stroke-linecap="butt" class="text-red-600"
                            :stroke-dasharray="donutFail?.dash" :stroke-dashoffset="donutFail?.offset"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <div class="text-2xl font-bold tabular-nums"><span x-text="donutPct"></span><span class="text-sm font-medium opacity-60">%</span></div>
                    <div class="text-[0.65rem] uppercase tracking-wide text-slate-500 dark:text-slate-400">passing</div>
                </div>
            </div>
        </section>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
            <div class="rounded-lg p-4 bg-accent text-white">
                <div class="text-sm opacity-90">Features</div>
                <div class="text-3xl font-bold mt-1" x-text="data.summary?.feature_count || 0">0</div>
            </div>
            <div class="rounded-lg p-4 bg-green-600 text-white">
                <div class="text-sm opacity-90">Scenarios Passed</div>
                <div class="text-3xl font-bold mt-1" x-text="data.summary?.scenario_passed || 0">0</div>
            </div>
            <div class="rounded-lg p-4 bg-red-600 text-white">
                <div class="text-sm opacity-90">Scenarios Failed</div>
                <div class="text-3xl font-bold mt-1" x-text="data.summary?.scenario_failed || 0">0</div>
            </div>
            <!-- Always shown so the 5-col KPI grid never leaves a trailing gap; greyed out when there
                 are no skipped scenarios (0), amber when some were skipped. -->
            <div class="rounded-lg p-4 text-white" :class="(data.summary?.scenario_skipped > 0) ? 'bg-amber-500' : 'bg-slate-500 dark:bg-slate-700 opacity-60'">
                <div class="text-sm opacity-90">Scenarios Skipped</div>
                <div class="text-3xl font-bold mt-1" x-text="data.summary?.scenario_skipped || 0">0</div>
            </div>
            <div class="rounded-lg p-4 bg-brand-700 text-white">
                <div class="text-sm opacity-90">Duration</div>
                <div class="text-3xl font-bold mt-1"><span x-text="data.summary?.duration_millis || 0">0</span><span class="text-base font-medium ml-1">ms</span></div>
            </div>
        </div>

        <!-- Ext-contributed KPI tiles (e.g. coverage %, requirements covered) — populated via
             Suite.addSummaryCard() from an ext's onShutdown(); absent (row hidden) when none. -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6" x-show="(data.summaryCards || []).length > 0">
            <template x-for="(c, idx) in (data.summaryCards || [])" :key="idx">
                <a :href="c.href || null"
                   class="rounded-lg p-4 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 block"
                   :class="c.href ? 'hover:border-accent transition-colors' : 'pointer-events-none'">
                    <div class="text-sm text-slate-500 dark:text-slate-400" x-text="c.label"></div>
                    <div class="text-3xl font-bold mt-1 tabular-nums" :class="summaryCardColor(c.status)" x-text="c.value"></div>
                    <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5" x-show="c.sub" x-text="c.sub"></div>
                </a>
            </template>
        </div>

        <!-- Tile row: Failures (baked-in) + ext-contributed tiles via summary.panels slot.
             Auto-fit grid means Failures spans full width when alone (Phase 1b) and
             shares the row when exts contribute (Phase 2). Container is always
             present so exts can target data-slot="summary.panels" without conditional
             logic on the loader side. -->
        <div class="grid gap-4 mb-6 grid-cols-[repeat(auto-fit,minmax(380px,1fr))]" x-show="failedScenarios.length > 0">
            <!-- Failures tile -->
            <div class="rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 overflow-hidden" x-show="failedScenarios.length > 0">
                <div class="flex items-center gap-2 px-4 py-2.5 border-b border-slate-200 dark:border-slate-700">
                    <svg class="w-4 h-4 text-red-600 dark:text-red-400"><use href="#icon-x-circle"/></svg>
                    <span class="font-medium">Failures</span>
                    <span class="px-1.5 py-0.5 text-[0.65rem] rounded-full bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300 tabular-nums" x-text="failedScenarios.length"></span>
                </div>
                <div class="divide-y divide-slate-100 dark:divide-slate-700/50 max-h-80 overflow-y-auto">
                    <template x-for="s in failedScenarios" :key="s.featureFile + s.refId">
                        <a class="flex items-start gap-3 px-4 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-800 group"
                           :href="'feature-html/' + s.featureFile + '.html#' + s.refId">
                            <span class="mt-0.5 w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></span>
                            <div class="min-w-0 flex-1">
                                <div class="text-sm truncate"><span class="font-mono text-xs text-slate-500 dark:text-slate-400 mr-1.5" x-text="s.refId"></span><span x-text="s.name || '(unnamed)'"></span></div>
                                <div class="text-xs text-slate-500 dark:text-slate-400 font-mono truncate" x-text="s.relativePath"></div>
                            </div>
                            <svg class="w-3 h-3 text-slate-400 group-hover:text-accent shrink-0 mt-1"><use href="#icon-chevron-right"/></svg>
                        </a>
                    </template>
                </div>
            </div>
            <!-- Ext-contributed tiles land here. See EXT.md § Slot model (summary.panels slot).
                 empty:hidden removes the slot from the grid until an
                 ext writes children into it, so the Failures tile spans full width. -->
            <div data-slot="summary.panels" class="empty:hidden contents"></div>
        </div>

        <!-- Tag Filter -->
        <div class="mb-4 flex flex-wrap items-center gap-2" x-show="allTags.length > 0">
            <span class="font-semibold text-sm mr-1">Filter by tag:</span>
            <template x-for="tag in allTags" :key="tag">
                <button class="px-2 py-1 text-xs rounded border"
                        :class="selectedTags.includes(tag)
                            ? 'bg-accent text-white border-accent'
                            : 'border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'"
                        @click="toggleTag(tag)"
                        x-text="tag"></button>
            </template>
            <button x-show="selectedTags.length > 0"
                    class="px-2 py-1 text-xs rounded border border-red-500 text-red-600 hover:bg-red-50 dark:hover:bg-red-950"
                    @click="selectedTags = []">Clear</button>
            <label x-show="selectedTags.length > 0" class="inline-flex items-center gap-1 ml-3 text-sm">
                <input type="checkbox" class="rounded" x-model="highlightMode">
                <span>Highlight only</span>
            </label>
        </div>

        <h2 class="text-xl font-semibold mb-3">Features</h2>
        <div class="overflow-x-auto">
        <table class="w-full text-sm border-collapse">
            <thead class="bg-brand-700 text-white">
                <tr>
                    <template x-for="col in sortableColumns" :key="col.field">
                        <th class="text-left px-3 py-2 cursor-pointer select-none hover:bg-brand-600"
                            :class="col.thClass || ''"
                            @click="sortBy(col.field)">
                            <span x-text="col.label"></span>
                            <svg x-show="sortField === col.field" class="w-3 h-3 inline-block align-middle ml-1">
                                <use :href="sortDir === 'asc' ? '#icon-chevron-up' : '#icon-chevron-down'"/>
                            </svg>
                        </th>
                    </template>
                    <th class="text-left px-3 py-2 w-24">Status</th>
                </tr>
            </thead>
            <!-- One <tbody> per feature so expanded scenario rows stay nested under
                 their parent feature row instead of collecting at table bottom. -->
            <template x-for="f in filteredFeatures" :key="f.fileName">
                <tbody class="divide-y divide-slate-200 dark:divide-slate-700 border-b border-slate-200 dark:border-slate-700">
                    <template x-if="highlightMode || featureMatchesTags(f)">
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800"
                            :class="{ 'bg-amber-100 dark:bg-amber-900/40': selectedTags.length > 0 && highlightMode && featureMatchesTags(f) }">
                            <td class="px-3 py-2">
                                <div class="flex items-start gap-1.5">
                                    <button x-show="f.scenarios?.length > 0"
                                            class="inline-flex items-center justify-center w-5 h-5 mt-0.5 rounded text-slate-400 hover:text-accent hover:bg-slate-100 dark:hover:bg-slate-700 shrink-0"
                                            :title="f.expanded ? 'Collapse scenarios' : 'Expand to see ' + (f.scenarios?.length || 0) + ' scenarios'"
                                            @click="f.expanded = !f.expanded">
                                        <svg class="w-4 h-4"><use :href="f.expanded ? '#icon-chevron-down' : '#icon-chevron-right'"/></svg>
                                    </button>
                                    <div class="min-w-0 flex-1">
                                        <a class="text-accent hover:underline" :href="'feature-html/' + f.fileName + '.html'" x-text="f.name || f.relativePath">Feature</a>
                                        <div class="text-xs text-slate-500 dark:text-slate-400 mt-0.5" x-text="f.relativePath">path</div>
                                    </div>
                                </div>
                                <template x-if="getFeatureTagCounts(f).length > 0">
                                    <div class="mt-1 flex flex-wrap gap-1">
                                        <template x-for="[tag, count] in getFeatureTagCounts(f)" :key="tag">
                                            <span class="inline-block px-1.5 py-0.5 text-[0.65rem] rounded bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300"
                                                  x-text="tag + ' (' + count + ')'"></span>
                                        </template>
                                    </div>
                                </template>
                            </td>
                            <td class="px-3 py-2 tabular-nums" x-text="f.scenarioCount">0</td>
                            <td class="px-3 py-2 tabular-nums" x-text="f.passedCount">0</td>
                            <td class="px-3 py-2 tabular-nums" x-text="f.failedCount">0</td>
                            <td class="px-3 py-2 tabular-nums" x-text="formatPassedRate(f.passedRate)">&mdash;</td>
                            <td class="px-3 py-2 tabular-nums"><span x-text="f.durationMillis">0</span> ms</td>
                            <td class="px-3 py-2">
                                <template x-if="statusOfFeature(f)">
                                    <span class="inline-block px-2 py-0.5 text-xs font-semibold rounded text-white"
                                          :class="statusOfFeature(f).cls"
                                          x-text="statusOfFeature(f).label"></span>
                                </template>
                            </td>
                        </tr>
                    </template>
                    <!-- Expanded scenarios under their parent feature. getMatchingScenarios
                         returns all scenarios with no filter, just matches when filtering. -->
                    <template x-if="f.expanded">
                        <template x-for="scenario in getMatchingScenarios(f)" :key="scenario.refId">
                            <tr class="bg-slate-50 dark:bg-slate-800/50 text-xs">
                                <td class="px-3 py-1.5 pl-10 border-l-4 border-accent">
                                    <a class="text-accent hover:underline" :href="'feature-html/' + f.fileName + '.html#' + scenario.refId">
                                        <span class="font-bold" x-text="scenario.refId"></span>
                                        <span x-text="' ' + (scenario.name || '')"></span>
                                    </a>
                                </td>
                                <td colspan="3" class="px-3 py-1.5">
                                    <template x-for="tag in scenario.tags || []" :key="tag">
                                        <span class="inline-block px-1.5 py-0.5 text-[0.65rem] rounded bg-accent text-white mr-1" x-text="tag"></span>
                                    </template>
                                </td>
                                <td></td>
                                <td class="px-3 py-1.5 tabular-nums" x-text="scenario.durationMillis + ' ms'"></td>
                                <td class="px-3 py-1.5">
                                    <span class="inline-block px-2 py-0.5 text-[0.65rem] font-semibold rounded text-white"
                                          :class="statusOf(scenario).cls"
                                          x-text="statusOf(scenario).label"></span>
                                </td>
                            </tr>
                        </template>
                    </template>
                </tbody>
            </template>
            <!-- Totals row in its own tbody so it stays at the table foot. -->
            <tbody>
                <tr class="bg-slate-100 dark:bg-slate-800 font-semibold" x-show="(data.features || []).length > 0">
                    <td class="px-3 py-2">Total (<span x-text="(data.features || []).length"></span> features)</td>
                    <td class="px-3 py-2 tabular-nums" x-text="totals.scenarios">0</td>
                    <td class="px-3 py-2 tabular-nums" x-text="totals.passed">0</td>
                    <td class="px-3 py-2 tabular-nums" x-text="totals.failed">0</td>
                    <td class="px-3 py-2 tabular-nums" x-text="formatPassedRate(totals.passedRate)">&mdash;</td>
                    <td class="px-3 py-2 tabular-nums"><span x-text="totals.durationMillis">0</span> ms</td>
                    <td></td>
                </tr>
            </tbody>
        </table>
        </div>
    </div>

    <footer class="border-t border-slate-200 dark:border-slate-700 text-center text-xs text-slate-500 dark:text-slate-400 py-4 mt-6">
        Generated by <a href="https://karatelabs.io" target="_blank" rel="noopener" class="hover:text-accent">Karate <span x-text="data.karateVersion">2.0</span></a>
        <span class="mx-1.5">·</span>
        <span x-text="data.reportDate"></span>
        <span class="mx-1.5">·</span>
        <a href="https://docs.karatelabs.io/" target="_blank" rel="noopener" class="hover:text-accent">Documentation</a>
    </footer>

    <script src="res/karate-report.js"></script>
    <script id="karate-data" type="application/json">/* KARATE_DATA */</script>
</body>
</html>
