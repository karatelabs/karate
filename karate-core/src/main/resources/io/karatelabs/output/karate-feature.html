<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="../res/karate-report.css"/>
    <link rel="icon" href="../res/favicon.ico"/>
    <script src="../res/alpine.min.js" defer></script>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('karate-theme') || 'light');</script>
    <!-- KARATE_EXTS -->
    <title>Karate Feature</title>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans antialiased" x-data="KarateReport.featureData()">
    <!-- KARATE_ICONS -->
    <nav class="fixed top-0 inset-x-0 z-30 flex items-center justify-between px-4 py-2 bg-slate-100 dark:bg-brand-navbar text-slate-900 dark:text-white border-b border-slate-200 dark:border-transparent h-14">
        <a class="flex items-center gap-2 font-medium min-w-0" href="../karate-summary.html">
            <img src="../res/karate-logo.svg" alt="Karate" height="32" class="h-8 shrink-0"/>
            <span class="truncate" x-text="featureSimpleName">Feature</span>
        </a>
        <div class="flex items-center gap-4 shrink-0">
            <a class="text-sm text-slate-600 hover:text-slate-900 dark:text-white/80 dark:hover:text-white" href="../karate-summary.html">Summary</a>
            <button class="p-1.5 rounded hover:bg-slate-200 dark:hover:bg-white/10" @click="toggleTheme()" title="Toggle theme">
                <svg x-show="theme === 'light'" class="w-4 h-4"><use href="#icon-moon"/></svg>
                <svg x-show="theme === 'dark'" class="w-4 h-4"><use href="#icon-sun"/></svg>
            </button>
            <span class="hidden sm:inline-block w-px h-5 bg-slate-300 dark:bg-white/20"></span>
            <a href="https://karatelabs.io/karate-enterprise?utm_source=karate-os&utm_medium=report&utm_campaign=enterprise-cta&utm_content=feature"
               target="_blank" rel="noopener"
               class="group inline-flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-medium bg-accent text-white hover:bg-accent-dark transition-colors"
               title="Karate Open Source vs Karate Enterprise — see what's included">
                <svg class="w-3.5 h-3.5"><use href="#icon-sparkle"/></svg>
                <span><span class="hidden md:inline">Try </span>Karate Enterprise</span>
                <svg class="w-3 h-3 transition-transform group-hover:translate-x-0.5"><use href="#icon-arrow-right"/></svg>
            </a>
        </div>
    </nav>

    <!-- Sticky left sidebar -->
    <nav class="hidden md:block fixed top-14 bottom-0 left-0 w-56 overflow-y-auto border-r border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 py-3">
        <div class="px-3 mb-2 text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">Scenarios</div>
        <template x-for="scenario in data.scenarios" :key="scenario.refId">
            <a class="block px-3 py-1.5 text-xs border-l-2 border-transparent hover:bg-slate-100 dark:hover:bg-slate-800 hover:border-accent"
               :class="scenario.skipped
                   ? 'text-amber-600 dark:text-amber-400'
                   : (scenario.passed ? 'text-green-700 dark:text-green-400' : 'text-red-700 dark:text-red-400')"
               :href="'#' + scenario.refId"
               :title="scenario.name">
                <span class="font-bold" x-text="scenario.refId"></span>
                <span x-text="scenario.name ? ' ' + truncate(scenario.name, 20) : ''"></span>
            </a>
        </template>
    </nav>

    <!-- Main content -->
    <main class="md:ml-56 mt-14 p-4">
        <nav aria-label="breadcrumb" class="mb-3 text-sm">
            <a class="text-accent hover:underline" href="../karate-summary.html">Summary</a>
            <span class="mx-2 text-slate-400">/</span>
            <span class="text-slate-700 dark:text-slate-300" x-text="data.name || data.path">Feature</span>
        </nav>

        <!-- Hero -->
        <section class="mb-5">
            <div class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full border text-xs font-medium" :class="heroStatus.pillCls">
                <span class="w-1.5 h-1.5 rounded-full" :class="heroStatus.dotCls"></span>
                <span x-text="heroStatus.label"></span>
            </div>
            <h1 class="mt-3 text-xl md:text-2xl font-semibold tracking-tight" x-text="data.name || 'Feature'">Feature Name</h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-mono mt-1" x-text="data.path">path/to/feature</p>
            <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-sm text-slate-500 dark:text-slate-400">
                <span class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-check-circle"/></svg> <span x-text="heroCounts.passed"></span> passed</span>
                <span x-show="heroCounts.failed > 0" class="inline-flex items-center gap-1.5 text-red-600 dark:text-red-400"><svg class="w-4 h-4"><use href="#icon-x-circle"/></svg> <span x-text="heroCounts.failed"></span> failed</span>
                <span x-show="heroCounts.skipped > 0" class="inline-flex items-center gap-1.5 text-amber-600 dark:text-amber-400"><svg class="w-4 h-4"><use href="#icon-minus-circle"/></svg> <span x-text="heroCounts.skipped"></span> skipped</span>
                <span x-show="data.durationMillis" class="inline-flex items-center gap-1.5"><svg class="w-4 h-4"><use href="#icon-clock"/></svg> <span x-text="data.durationMillis"></span> ms</span>
            </div>
        </section>

        <!-- Scenarios -->
        <template x-for="scenario in data.scenarios" :key="scenario.refId">
            <div class="rounded-lg border border-slate-200 dark:border-slate-700 mb-4 overflow-hidden" :id="scenario.refId">
                <div class="flex justify-between items-center px-3 py-2"
                     :class="scenario.skipped
                         ? 'bg-amber-50 dark:bg-amber-950/30 border-b border-amber-200 dark:border-amber-900'
                         : (scenario.passed
                             ? 'bg-green-50 dark:bg-green-950/30 border-b border-green-200 dark:border-green-900'
                             : 'bg-red-50 dark:bg-red-950/30 border-b border-red-200 dark:border-red-900')">
                    <span class="flex items-center gap-2 flex-wrap min-w-0">
                        <span class="font-bold" x-text="scenario.refId"></span>
                        <span x-text="scenario.name"></span>
                        <template x-if="scenario.isOutlineExample">
                            <span class="inline-block px-1.5 py-0.5 text-[0.65rem] rounded bg-accent text-white">Outline</span>
                        </template>
                        <template x-for="tag in scenario.tags || []" :key="tag">
                            <span class="inline-block px-1.5 py-0.5 text-[0.65rem] rounded bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300" x-text="tag"></span>
                        </template>
                    </span>
                    <span class="flex items-center gap-2 shrink-0">
                        <span class="text-xs text-slate-500 dark:text-slate-400" x-text="scenario.durationMillis + ' ms'"></span>
                        <span class="inline-block px-2 py-0.5 text-[0.65rem] font-semibold rounded text-white"
                              :class="statusOf(scenario).cls"
                              x-text="statusOf(scenario).label"></span>
                    </span>
                </div>
                <div class="" x-html="renderSteps(scenario.steps)"></div>
                <template x-if="scenario.error && !scenario.steps?.some(s => s.error)">
                    <div class="bg-red-50 dark:bg-red-950/40 border-t border-red-200 dark:border-red-900 px-3 py-2">
                        <pre class="m-0 text-xs text-red-700 dark:text-red-300 whitespace-pre-wrap" x-text="scenario.error"></pre>
                    </div>
                </template>
            </div>
        </template>
    </main>

    <footer class="md:ml-56 border-t border-slate-200 dark:border-slate-700 text-center text-xs text-slate-500 dark:text-slate-400 py-4 mt-6">
        Generated by <a href="https://karatelabs.io" target="_blank" rel="noopener" class="hover:text-accent">Karate <span x-text="data.karateVersion">2.0</span></a>
        <span class="mx-1.5">·</span>
        <a href="https://docs.karatelabs.io/" target="_blank" rel="noopener" class="hover:text-accent">Documentation</a>
    </footer>

    <script src="../res/karate-report.js"></script>
    <script id="karate-data" type="application/json">/* KARATE_DATA */</script>
</body>
</html>
