<!DOCTYPE html>
<!--
    Self-contained page. /raw-page is registered in ServerConfig.rawPaths(),
    which skips shell-wrap so this template ships its own <html>/<head>.
    Typical uses: signin/signout pages with bespoke branding.
-->
<html>
<head>
    <title>Raw Page</title>
</head>
<body>
<div id="raw-page">
    <h1>Self-contained page</h1>
    <p>No shell wrap here.</p>
</div>
</body>
</html>
