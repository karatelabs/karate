name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please search [existing issues](https://github.com/karatelabs/karate/issues) first to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this solve or what use case does it enable?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered
