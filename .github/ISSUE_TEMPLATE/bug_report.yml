name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! For general questions, please use [GitHub Discussions](https://github.com/karatelabs/karate/discussions).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Given this feature file...
        2. When I run...
        3. I see...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages or logs if applicable)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Karate Version
      placeholder: e.g. 2.0.0
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: e.g. 21.0.2
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
