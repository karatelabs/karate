name: test262

# Manually-triggered ECMAScript conformance run for karate-js.
# Clones tc39/test262 at the pinned SHA, runs the full suite, generates the
# HTML report, and uploads both the report and results.jsonl as artifacts.

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Restrict to a path glob (empty = full suite)"
        required: false
        default: ""
      timeout_ms:
        description: "Per-test watchdog (ms)"
        required: false
        default: "10000"

permissions: read-all

jobs:
  test262:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Fetch test262
        run: |
          chmod +x karate-js-test262/etc/fetch-test262.sh
          karate-js-test262/etc/fetch-test262.sh

      # Single Maven invocation: install karate-js into the local repo (so the
      # test262 module can resolve it), then compile the test262 module. Using
      # -am -pl builds only what's needed.
      - name: Build reactor (karate-js + test262 harness)
        run: mvn -B -ntp -pl karate-js-test262 -am install -DskipTests

      # Compute a per-run output directory ONCE so the runner and the report
      # write into the same self-contained dir. Mirrors etc/run.sh's behavior.
      - name: Compute run-dir
        id: rundir
        working-directory: karate-js-test262
        run: |
          RUN_DIR="target/test262/run-$(date -u +%Y-%m-%d-%H%M%S)"
          echo "path=$RUN_DIR" >> "$GITHUB_OUTPUT"
          echo "Run dir: $RUN_DIR"

      - name: Run test262 suite
        working-directory: karate-js-test262
        env:
          EXEC_ARGS: >-
            --run-dir ${{ steps.rundir.outputs.path }}
            ${{ github.event.inputs.only != '' && format('--only {0}', github.event.inputs.only) || '' }}
            --timeout-ms ${{ github.event.inputs.timeout_ms }}
        run: mvn -B -ntp -f ../pom.xml -pl karate-js-test262 -o exec:java -Dexec.args="$EXEC_ARGS"

      - name: Generate HTML report
        working-directory: karate-js-test262
        run: >
          mvn -B -ntp -f ../pom.xml -pl karate-js-test262 -o exec:java
          -Dexec.mainClass=io.karatelabs.js.test262.Test262Report
          -Dexec.args="--run-dir ${{ steps.rundir.outputs.path }}"

      # The per-run dir contains everything (results.jsonl, run-meta.json,
      # progress.log, html/). The artifact uploads the entire target/test262/
      # parent so old runs (if any) come along too — typically there's just one.
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test262-report
          retention-days: 14
          path: karate-js-test262/target/test262/

      - name: Print summary
        if: always()
        working-directory: karate-js-test262
        run: |
          META="${{ steps.rundir.outputs.path }}/run-meta.json"
          if [ -f "$META" ]; then
            echo "### test262 summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$META" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
