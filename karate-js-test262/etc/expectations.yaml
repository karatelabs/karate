# test262 expectations for karate-js
#
# Only concept: SKIP. If a test matches any rule below, it's not run
# and appears in results.jsonl as {"status":"SKIP","reason":...}.
# Everything else is attempted — failures are failures, recorded as FAIL.
#
# Match order: paths -> flags -> features -> includes. First match wins.
# All entries MUST have a `reason` (one short sentence).
#
# To add a skip: put the rule in the right section, write the reason, commit.

version: 1

skip:

  # Entire suite directories that are out of scope for an ES6 core engine.
  # Paths use glob syntax (* matches within a segment, ** across segments).
  paths:
    - path: test/intl402/**
      reason: internationalization (ECMA-402) out of scope
    - path: test/staging/**
      reason: experimental proposals not yet ratified
    - path: test/annexB/**
      reason: legacy-web-browser behaviors out of scope
    # class syntax: Phases 1+2+3 implemented (constructor, instance/static
    # methods, get/set accessors, computed keys, class expressions, default
    # constructor, extends, super(...) / super.method(), public instance+static
    # fields; covered by JsClassTest, 44 cases). ~1090 class tests would PASS.
    # STILL path-skipped — measured (2026-05-30) un-skip is NOT clean yet: with
    # the path-skip + feature:class + class-fields-public removed (private /
    # generators / async kept feature-skipped), the three class slices still
    # produce ~1000 FAILs, dominated by (1) the public-field conformance tail
    # under elements/ (~249), (2) ~108 untagged private-#x / generator / async /
    # decorator tests that lack feature tags so feature-skips miss them and they
    # hit "class member name" parse errors, and (3) ~105 negative class
    # early-error tests the parser doesn't enforce. These would pollute every
    # language probe. Un-skip gate: (a) harden public fields against the edge
    # tail, (b) land the parser class-early-error sweep, (c) implement or
    # reliably skip the untagged private/generator/async/decorator tail. Until
    # then the path-skip stays; the engine capability is proven by JsClassTest.
    - path: test/language/**/class/**
      reason: class private/generators/async/decorators + field/early-error conformance tail not done (Phases 1-3 done — see JsClassTest)
    - path: test/language/expressions/super/**
      reason: object-literal-method super + super edge cases (this-TDZ, return-override) not done (class super done — see JsClassTest)
    - path: test/language/statements/with/**
      reason: with-statement is conformance-only, negligible in real-world JS and LLM-written code
    - path: test/language/eval-code/direct/**
      reason: direct-eval lexical-environment semantics are exotic, negligible in real-world JS
    - path: test/language/statements/try/early-catch-duplicates.js
      reason: duplicate-BoundNames early error (catch param) un-enforced — part of the deferred duplicate-binding-name sweep (also FN_DECL_ARGS); a naive check would false-positive on valid renamed patterns

  # Tests whose YAML frontmatter contains any of these `flags:` values.
  flags:
    - flag: module
      reason: karate-js does not support ES modules
    - flag: async
      reason: async/await not supported
    # onlyStrict: the CAPABILITY is in place but the flag stays skipped to keep
    # language probes clean. The runner prepends a "use strict" directive for these
    # tests (Test262Runner.evaluate, dormant while skipped) and the parser enforces
    # the strict-mode early errors (octal literals, eval/arguments binding+assignment,
    # duplicate params — JsParser.checkStrictEarlyErrors). Measured un-skip
    # (2026-05-30, test/language/**): 428 tests -> 71 PASS / 357 FAIL, 0 regressions.
    # The 357 fails are real not-yet-done strict semantics: ~216 destructuring
    # parse-phase early errors (the duplicate-binding / pattern sweep — next up),
    # ~71 strict runtime TypeErrors, ~17 logical-assignment unresolved-LHS. Un-skip
    # gate: land those sweeps so the flip is net-positive, then delete this rule.
    - flag: onlyStrict
      reason: strict-mode capability ready (runner strict-pass + parser early errors); un-skip gated on destructuring early-error sweep + strict runtime TypeErrors (measured 71 PASS/357 FAIL — see comment)
    - flag: CanBlockIsTrue
      reason: engine cannot block on shared-memory worker agents
    - flag: CanBlockIsFalse
      reason: CanBlock flag not modeled

  # Tests whose YAML frontmatter contains any of these `features:` values.
  features:
    - feature: Symbol
      reason: Symbol primitive type / unique identity / Symbol() constructor not supported
    - feature: Symbol.toStringTag
      reason: requires Symbol primitive (well-known @@toStringTag tested via Symbol[])
    - feature: Symbol.asyncIterator
      reason: async iteration not supported
    # Symbol.iterator un-skipped: karate-js exposes @@iterator (string-keyed
    # stand-in) on JsArray / JsString and routes for-of / spread / destructuring /
    # Array.from through IterUtils.getIterator.
    # Symbol.toPrimitive un-skipped: dispatch now routes through obj["@@toPrimitive"]
    # (Terms.toPrimitive + Terms.add). Tests that ALSO need the Symbol primitive
    # (e.g. `typeof Symbol.toPrimitive === "symbol"`) still skip via `feature: Symbol`.
    # Tests using only the well-known stand-in pass on the new dispatch.
    # BigInt un-skipped: lexer recognizes the `n` literal suffix, runtime is backed
    # by java.math.BigInteger, arithmetic dispatches through Terms with TypeError on
    # mixing with Number, JSON.stringify throws TypeError per spec.
    - feature: generators
      reason: generator functions not supported
    - feature: class
      reason: class syntax not supported (use prototypes)
    - feature: class-fields-public
      reason: class syntax not supported
    - feature: class-fields-private
      reason: class syntax not supported
    - feature: class-methods-private
      reason: class syntax not supported
    - feature: class-static-fields-public
      reason: class syntax not supported
    - feature: class-static-methods-private
      reason: class syntax not supported
    - feature: Proxy
      reason: Proxy not implemented
    - feature: Reflect
      reason: Reflect not implemented
    - feature: async-functions
      reason: async/await not supported
    - feature: async-iteration
      reason: async/await not supported
    - feature: Temporal
      reason: Temporal proposal not implemented
    - feature: TypedArray
      reason: only Uint8Array is supported
    - feature: Float16Array
      reason: Float16Array (ES2025) not implemented; Math.f16round depends on it
    - feature: ArrayBuffer
      reason: ArrayBuffer semantics not implemented
    - feature: resizable-arraybuffer
      reason: resizable ArrayBuffer (ES2024) not implemented; harness requires Int8Array
    - feature: cross-realm
      reason: multi-realm semantics not modeled ($262.createRealm absent)
    - feature: SharedArrayBuffer
      reason: SharedArrayBuffer not implemented
    - feature: DataView
      reason: DataView not implemented
    - feature: Atomics
      reason: Atomics not supported
    - feature: WeakRef
      reason: WeakRef not implemented
    - feature: FinalizationRegistry
      reason: FinalizationRegistry not implemented
    - feature: WeakMap
      reason: WeakMap not implemented
    - feature: WeakSet
      reason: WeakSet not implemented
    - feature: Promise
      reason: Promises not supported
    - feature: Promise.any
      reason: Promises not supported
    - feature: Promise.allSettled
      reason: Promises not supported
    - feature: regexp-lookbehind
      reason: regex lookbehind not yet implemented
    - feature: regexp-unicode-property-escapes
      reason: unicode property escapes not implemented
    - feature: regexp-match-indices
      reason: match indices not implemented
    - feature: regexp-duplicate-named-groups
      reason: duplicate named groups not implemented
    - feature: regexp-v-flag
      reason: /v regex flag not implemented
    - feature: dynamic-import
      reason: dynamic import not supported
    # numeric-separator-literal un-skipped: lexer accepts `_` between digits in
    # decimal, hex, exponent, and BigInt literals; first-char and trailing/doubled
    # separators are early errors.
    - feature: tail-call-optimization
      reason: tail-call optimization not guaranteed
    - feature: Math.sumPrecise
      reason: Math.sumPrecise (ES2025 stage 3+) not implemented
    # destructuring-binding is INTENTIONALLY NOT skipped — LLM-written JS uses
    # `const { a, b } = obj` constantly; we want to surface real breakage here.
    # If engine support proves too incomplete, re-add with a specific reason.
    - feature: new.target
      reason: new.target not supported
    # Array.prototype.includes un-skipped: implemented in JsArrayPrototype.
    - feature: globalThis
      reason: globalThis not exposed

  # Tests whose YAML frontmatter `includes:` references any of these harness helpers
  # (the harness file itself may exist, but it depends on engine internals we do not expose).
  # propertyHelper.js + compareArray.js un-skipped: per-property attribute bits
  # (writable / enumerable / configurable) are now tracked on JsObject and
  # enforced on putMember / removeMember / for-in / propertyIsEnumerable.
  # compareArray.js itself is now an empty stub (the helper moved into assert.js);
  # its users no longer need a special harness.
  includes:
    - include: nativeFunctionMatcher.js
      reason: depends on Function.prototype.toString internals
    - include: promiseHelper.js
      reason: Promises not supported
    - include: detachArrayBuffer.js
      reason: ArrayBuffer semantics not implemented
    - include: testTypedArray.js
      reason: TypedArray (beyond Uint8Array) not supported
    - include: testAtomics.js
      reason: Atomics not supported
    - include: testBigIntTypedArray.js
      reason: BigInt64Array / BigUint64Array (TypedArray beyond Uint8Array) not supported
    - include: testIntl.js
      reason: internationalization out of scope
    - include: proxyTrapsHelper.js
      reason: Proxy not implemented
